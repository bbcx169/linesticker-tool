<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能圖片處理與 LINE 貼圖工具 v 1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- APNG 必要的庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/1.0.11/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    
    <style>
        .drag-over { background-color: #eef2ff !important; border-color: #6366f1 !important; }
        .ghost-card { opacity: 0.4; background-color: #f3f4f6; border: 2px dashed #6366f1; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bg-checker {
            background-color: #f0f0f0;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen p-6 font-sans relative">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <header class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-2xl font-bold text-gray-900 flex items-center flex-wrap gap-2">
                <svg class="w-7 h-7 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span>全能圖片處理與 LINE 貼圖工具 v 1.0</span>
                <span class="text-sm font-normal text-gray-400 ml-1 mt-1 font-mono">2026.03.13</span>
            </h1>
            <p class="text-gray-500 text-sm mt-1">從大圖裁切、去背到合成 Animated PNG (APNG) 的一站式流程</p>
        </header>

        <!-- Step 1: 裁切區 -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-indigo-200 space-y-4">
            <div class="flex items-center gap-2 border-b border-indigo-100 pb-2">
                <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-sm font-bold">Step 1</span>
                <h2 class="text-lg font-semibold text-gray-800">網格等分裁切</h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-3">
                    <div id="splitUploadZone" class="border-2 border-dashed border-indigo-300 rounded-xl p-8 flex flex-col items-center justify-center bg-indigo-50 cursor-pointer hover:bg-indigo-100 transition-all group min-h-[160px]">
                        <p class="text-gray-700 font-medium text-center pointer-events-none">點擊或拖曳大圖至此進行分割</p>
                        <input type="file" id="splitFileInput" accept="image/*" class="hidden">
                    </div>
                    <div id="splitPreviewContainer" class="hidden border rounded-lg bg-checker overflow-hidden flex items-center justify-center h-64 relative">
                        <img id="splitPreviewImg" class="max-h-full max-w-full object-contain shadow" src="">
                        <button id="clearSplitImgBtn" class="absolute top-2 right-2 bg-gray-800/70 hover:bg-red-600 text-white p-2 rounded-full transition shadow-md">✕</button>
                    </div>
                </div>
                <div class="space-y-4 bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col">
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="text-xs text-gray-500 mb-1 block">垂直行數 (Rows)</label>
                            <input type="number" id="splitRows" value="1" min="1" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="flex-1">
                            <label class="text-xs text-gray-500 mb-1 block">水平列數 (Cols)</label>
                            <input type="number" id="splitCols" value="1" min="1" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-3 mt-auto">
                        <button id="splitAndImportBtn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold disabled:bg-gray-300 transition-colors shadow" disabled>✂️ 分割並匯入工作區</button>
                        <button id="directImportBtn" class="w-full py-3 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 rounded-lg font-bold disabled:opacity-50 disabled:bg-gray-50 transition-colors shadow-sm" disabled>➡️ 不裁切，直接匯入</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Step 2: 批次處理設定 -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-6">
            <div class="flex items-center gap-2 border-b pb-2">
                <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-sm font-bold">Step 2</span>
                <h2 class="text-lg font-semibold">批次處理設定</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 背景處理 -->
                <div>
                    <h3 class="font-medium mb-3 text-sm text-gray-600 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        背景處理
                    </h3>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="radio" name="bgRemoval" value="none" class="w-4 h-4 text-indigo-600"> <span>保留原背景</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="bgRemoval" value="remove" checked class="w-4 h-4 text-indigo-600"> <span>綠幕去背 (#00FF00)</span></label>
                </div>

                <!-- 輸出尺寸 -->
                <div>
                    <h3 class="font-medium mb-3 text-sm text-gray-600 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5"></path></svg>
                        輸出尺寸設定
                    </h3>
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="resizeMode" value="original" checked class="w-4 h-4 text-indigo-600"> 
                            <span>原尺寸 (Original)</span>
                        </label>
                        
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="resizeMode" value="custom" class="w-4 h-4 text-indigo-600"> 
                            <span>自定大小 (居中裁切)</span>
                        </label>
                        <div id="customSizeArea" class="mt-1 hidden flex items-center gap-1 pl-6">
                            <input type="number" id="customWidthVal" value="320" class="w-20 border rounded p-1.5 text-xs focus:ring-1 focus:ring-indigo-500 outline-none">
                            <span class="text-gray-400">x</span>
                            <input type="number" id="customHeightVal" value="270" class="w-20 border rounded p-1.5 text-xs focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>

                        <div class="border-t pt-2 mt-2">
                            <label class="flex items-center gap-2 cursor-pointer font-semibold text-indigo-600">
                                <input type="radio" name="resizeMode" value="line" class="w-4 h-4 text-indigo-600"> 
                                <span>LINE 貼圖專區</span>
                            </label>
                            <div id="linePresetArea" class="mt-2 hidden pl-6">
                                <select id="linePresetVal" class="w-full border rounded p-1.5 text-xs text-indigo-700 bg-indigo-50 border-indigo-200 outline-none cursor-pointer">
                                    <option value="370,320">貼圖 (370 x 320)</option>
                                    <option value="320,270" selected>動態貼圖 (320 x 270)</option>
                                    <option value="240,240">Main 圖片 (240 x 240)</option>
                                    <option value="96,74">Tab 圖片 (96 x 74)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 輸出格式 -->
                <div>
                    <h3 class="font-medium mb-3 text-sm text-gray-600 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        輸出格式
                    </h3>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="radio" name="outputFormat" value="original" checked class="w-4 h-4 text-indigo-600"> <span>自動 (PNG)</span></label>
                    <label class="flex items-center gap-2 mt-2 cursor-pointer"><input type="radio" name="outputFormat" value="jpg" class="w-4 h-4 text-indigo-600"> <span>JPG (補白底)</span></label>
                </div>
            </div>
        </section>

        <!-- Step 3: 工作區 -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mt-8 mb-4 gap-4">
            <div class="flex items-center gap-2">
                <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-sm font-bold">Step 3</span>
                <h2 class="text-lg font-semibold">處理與排序工作區</h2>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="sortOriginalBtn" class="flex-1 sm:flex-none text-xs bg-white border px-4 py-2 rounded-lg hover:bg-gray-50 font-medium shadow-sm transition-colors">依檔名排序</button>
                <button id="batchDownloadBtn" class="flex-1 sm:flex-none text-xs bg-green-600 text-white px-4 py-2 rounded-lg font-bold shadow-sm hover:bg-green-700 transition-colors">打包 ZIP</button>
            </div>
        </div>

        <section id="uploadZone" class="border-2 border-dashed border-gray-300 rounded-xl p-6 flex flex-col items-center justify-center bg-white cursor-pointer hover:bg-gray-50 transition-all group min-h-[120px]">
            <svg class="w-8 h-8 text-gray-300 group-hover:text-indigo-400 mb-2 transition-colors pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <p class="text-gray-500 text-sm pointer-events-none">點擊或拖曳額外圖片加入序列</p>
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
        </section>

        <ul id="gallery" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4 mt-6"></ul>

        <!-- Step 4: APNG 合成區 -->
        <section class="bg-indigo-900 p-6 rounded-xl shadow-xl border border-indigo-700 space-y-4 text-white">
            <div class="flex items-center gap-2 border-b border-indigo-800 pb-2">
                <span class="bg-yellow-400 text-indigo-900 px-2 py-1 rounded text-sm font-bold">Step 4</span>
                <h2 class="text-lg font-semibold">LINE 動態貼圖匯出 (APNG)</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                <div>
                    <label class="block text-xs text-indigo-200 mb-1">每幀延遲 (ms)</label>
                    <input type="number" id="apngDelay" value="100" min="10" step="10" class="w-full bg-indigo-800 border-none rounded-lg p-3 text-white focus:ring-2 focus:ring-yellow-400 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-indigo-200 mb-1">迴圈次數 (0=無限)</label>
                    <input type="number" id="apngLoop" value="0" min="0" class="w-full bg-indigo-800 border-none rounded-lg p-3 text-white focus:ring-2 focus:ring-yellow-400 outline-none">
                </div>
                <button id="makeApngBtn" class="w-full py-3 bg-yellow-400 hover:bg-yellow-500 text-indigo-900 rounded-lg font-black transition-all transform active:scale-95 shadow-lg flex items-center justify-center gap-2 text-sm">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14H11V21L20 10H13Z"/></svg>
                    合成預覽 APNG
                </button>
            </div>
        </section>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/80 z-[60] flex flex-col items-center justify-center text-white hidden backdrop-blur-md">
        <div class="spinner mb-4"></div>
        <h2 id="loadingTitle" class="text-xl font-bold mb-2">處理中...</h2>
        <p id="loadingText" class="text-gray-400 text-sm font-mono">請稍候...</p>
    </div>

    <!-- APNG 預覽彈窗 -->
    <div id="apngPreviewModal" class="fixed inset-0 bg-black/90 z-[70] hidden flex flex-col items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 max-w-lg w-full shadow-2xl space-y-6 flex flex-col items-center text-center">
            <div class="w-full border-b pb-2 flex justify-between items-center text-gray-800 font-bold">
                <span>APNG 動畫預覽</span>
                <button id="closePreviewBtn" class="text-gray-400 hover:text-red-500">✕ 關閉</button>
            </div>
            <div class="bg-checker w-full aspect-square rounded-xl flex items-center justify-center overflow-hidden border">
                <img id="apngResultImg" class="max-w-full max-h-full object-contain" src="">
            </div>
            <div class="w-full grid grid-cols-2 gap-4">
                <button id="rebuildApngBtn" class="py-3 bg-gray-100 rounded-xl font-bold">重新設定</button>
                <button id="downloadApngBtn" class="py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">確認下載</button>
            </div>
        </div>
    </div>

    <!-- 清理確認彈窗 -->
    <div id="clearConfirmModal" class="fixed inset-0 bg-black/60 z-[80] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl space-y-6 text-center">
            <h3 class="text-xl font-bold text-gray-900">準備進行下一輪作業</h3>
            <p class="text-gray-500 text-sm">是否要一併清空下方工作區的圖片？</p>
            <div class="flex flex-col gap-3">
                <button id="btnKeepGallery" class="py-3 bg-indigo-600 text-white font-bold rounded-xl">保留工作區</button>
                <button id="btnClearAll" class="py-3 bg-gray-100 text-gray-600 font-bold rounded-xl">一併清空</button>
            </div>
        </div>
    </div>

    <script>
        // ================= 核心狀態 =================
        let filesData = [];
        let currentSplitImage = null;
        let currentSplitFile = null; 
        let currentApngBlob = null; 

        const gallery = document.getElementById('gallery');
        const splitPreviewImg = document.getElementById('splitPreviewImg');
        const splitPreviewContainer = document.getElementById('splitPreviewContainer');
        const splitUploadZone = document.getElementById('splitUploadZone');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const previewModal = document.getElementById('apngPreviewModal');
        const apngResultImg = document.getElementById('apngResultImg');
        const clearConfirmModal = document.getElementById('clearConfirmModal');

        new Sortable(gallery, { animation: 150, ghostClass: 'ghost-card', onEnd: updateAllFilenames });

        // ================= 事件處理 =================
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            splitUploadZone.addEventListener(name, preventDefaults, false);
            document.getElementById('uploadZone').addEventListener(name, preventDefaults, false);
        });

        splitUploadZone.addEventListener('dragover', () => splitUploadZone.classList.add('drag-over'), false);
        splitUploadZone.addEventListener('dragleave', () => splitUploadZone.classList.remove('drag-over'), false);
        splitUploadZone.addEventListener('drop', (e) => {
            splitUploadZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) handleSplitFileUpload(e.dataTransfer.files[0]);
        }, false);
        splitUploadZone.onclick = () => document.getElementById('splitFileInput').click();
        document.getElementById('splitFileInput').onchange = (e) => { if(e.target.files.length > 0) handleSplitFileUpload(e.target.files[0]); };

        const uploadZone = document.getElementById('uploadZone');
        uploadZone.addEventListener('dragover', () => uploadZone.classList.add('drag-over'), false);
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'), false);
        uploadZone.addEventListener('drop', (e) => { uploadZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); }, false);
        uploadZone.onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);

        document.querySelectorAll('input[name="resizeMode"]').forEach(radio => {
            radio.onchange = (e) => {
                document.getElementById('customSizeArea').style.display = e.target.value === 'custom' ? 'flex' : 'none';
                document.getElementById('linePresetArea').style.display = e.target.value === 'line' ? 'block' : 'none';
                updateAllFilenames();
            };
        });

        // ================= 功能函式 =================
        function handleSplitFileUpload(file) {
            if (!file || !file.type.startsWith('image/')) return;
            currentSplitFile = file;
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                currentSplitImage = img;
                splitPreviewImg.src = url;
                splitPreviewContainer.classList.remove('hidden');
                splitUploadZone.classList.add('hidden');
                document.getElementById('splitAndImportBtn').disabled = document.getElementById('directImportBtn').disabled = false;
            };
            img.src = url;
        }

        document.getElementById('directImportBtn').onclick = async () => {
            if (!currentSplitFile) return;
            showLoading(true, "匯入中...", "直接加入大圖");
            await handleFiles([currentSplitFile]);
            showLoading(false);
        };

        document.getElementById('splitAndImportBtn').onclick = async () => {
            if (!currentSplitImage) return;
            const rows = parseInt(document.getElementById('splitRows').value) || 1;
            const cols = parseInt(document.getElementById('splitCols').value) || 1;
            showLoading(true, "裁切中...", "分割大圖");
            const chunkW = currentSplitImage.width / cols;
            const chunkH = currentSplitImage.height / rows;
            const canvas = document.createElement('canvas');
            canvas.width = chunkW; canvas.height = chunkH;
            const ctx = canvas.getContext('2d');
            const newFiles = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    ctx.clearRect(0, 0, chunkW, chunkH);
                    ctx.drawImage(currentSplitImage, x * chunkW, y * chunkH, chunkW, chunkH, 0, 0, chunkW, chunkH);
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                    newFiles.push(new File([blob], `slice_${y+1}_${x+1}.png`, { type: 'image/png' }));
                }
            }
            await handleFiles(newFiles);
            showLoading(false);
        };

        async function handleFiles(files) {
            for (const file of Array.from(files)) {
                if (!file.type.startsWith('image/')) continue;
                const id = 'img_' + Math.random().toString(36).substr(2, 9);
                const dataUrl = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = (e) => r(e.target.result);
                    reader.readAsDataURL(file);
                });
                filesData.push({ id, originalFile: file, originalName: file.name, dataUrl });
                createGalleryItem(id, dataUrl, file.name);
            }
            updateAllFilenames();
        }

        function createGalleryItem(id, url, name) {
            const li = document.createElement('li');
            li.dataset.id = id; li.dataset.origName = name;
            li.className = 'bg-white rounded-lg shadow border border-gray-200 p-2 cursor-move group relative';
            li.innerHTML = `
                <button onclick="removeImage('${id}')" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] z-10 opacity-0 group-hover:opacity-100">✕</button>
                <div class="aspect-square bg-checker rounded overflow-hidden mb-2 flex items-center justify-center">
                    <img src="${url}" class="max-w-full max-h-full object-contain pointer-events-none">
                </div>
                <div class="text-center">
                    <p class="text-[9px] text-gray-400 truncate output-filename">--</p>
                    <button onclick="handleSingleDownload('${id}')" class="w-full mt-1 py-1 bg-indigo-50 text-indigo-700 text-[9px] font-bold rounded">下載</button>
                </div>
            `;
            gallery.appendChild(li);
        }

        function removeImage(id) {
            filesData = filesData.filter(f => f.id !== id);
            gallery.querySelector(`li[data-id="${id}"]`).remove();
            updateAllFilenames();
        }

        function updateAllFilenames() {
            const settings = getCurrentSettings();
            Array.from(gallery.children).forEach((item, index) => {
                const fileObj = filesData.find(f => f.id === item.dataset.id);
                if (!fileObj) return;
                const ext = settings.outputFormat === 'jpg' ? 'jpg' : (settings.bgRemoval === 'remove' ? 'png' : (fileObj.originalFile.type === 'image/jpeg' ? 'jpg' : 'png'));
                const newName = `${String(index + 1).padStart(2, '0')}.${ext}`;
                item.querySelector('.output-filename').innerText = newName;
                item.dataset.outputName = newName;
            });
        }

        function getCurrentSettings() {
            const mode = document.querySelector('input[name="resizeMode"]:checked').value;
            let w = null, h = null;
            if (mode === 'custom') {
                w = parseInt(document.getElementById('customWidthVal').value) || 270;
                h = parseInt(document.getElementById('customHeightVal').value) || 270;
            } else if (mode === 'line') {
                const preset = document.getElementById('linePresetVal').value.split(',');
                w = parseInt(preset[0]); h = parseInt(preset[1]);
            }
            return { bgRemoval: document.querySelector('input[name="bgRemoval"]:checked').value, resizeMode: mode, targetWidth: w, targetHeight: h, outputFormat: document.querySelector('input[name="outputFormat"]:checked').value };
        }

        async function processImage(fileObj, settings) {
            const img = await blobToImage(fileObj.originalFile);
            let dW = img.width, dH = img.height;
            let sx = 0, sy = 0, sW = img.width, sH = img.height;
            if (settings.resizeMode !== 'original') {
                dW = settings.targetWidth; dH = settings.targetHeight;
                const scale = Math.max(dW / img.width, dH / img.height);
                sW = dW / scale; sH = dH / scale;
                sx = (img.width - sW) / 2; sy = (img.height - sH) / 2;
            }
            const canvas = document.createElement('canvas');
            canvas.width = dW; canvas.height = dH;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, sx, sy, sW, sH, 0, 0, dW, dH);
            if (settings.bgRemoval === 'remove') {
                const idata = ctx.getImageData(0, 0, dW, dH);
                for (let i = 0; i < idata.data.length; i += 4) {
                    if (idata.data[i+1] > 120 && idata.data[i] < idata.data[i+1]*0.6 && idata.data[i+2] < idata.data[i+1]*0.6) idata.data[i+3] = 0;
                }
                ctx.putImageData(idata, 0, 0);
            }
            return new Promise(r => canvas.toBlob(r, settings.outputFormat === 'jpg' ? 'image/jpeg' : 'image/png', 0.9));
        }

        async function handleSingleDownload(id) {
            const fileObj = filesData.find(f => f.id === id);
            const item = gallery.querySelector(`li[data-id="${id}"]`);
            saveAs(await processImage(fileObj, getCurrentSettings()), item.dataset.outputName);
        }

        // ================= 打包 ZIP 修正 =================
        document.getElementById('batchDownloadBtn').onclick = handleBatchDownload;
        async function handleBatchDownload() {
            const items = Array.from(gallery.children);
            if (items.length === 0) { alert("工作區內沒有圖片可以打包！"); return; }
            
            showLoading(true, "打包 ZIP 中...", "準備處理圖片...");
            try {
                const zip = new JSZip();
                const settings = getCurrentSettings();
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    const id = item.dataset.id;
                    const fileObj = filesData.find(f => f.id === id);
                    if (!fileObj) continue;
                    
                    loadingText.innerText = `正在處理 (${i+1}/${items.length}): ${item.dataset.outputName}`;
                    const blob = await processImage(fileObj, settings);
                    zip.file(item.dataset.outputName, blob);
                }
                loadingText.innerText = "正在生成 ZIP 壓縮檔...";
                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, `stickers_${Date.now()}.zip`);
            } catch (err) { alert("打包失敗：" + err.message); }
            finally { showLoading(false); }
        }

        document.getElementById('makeApngBtn').onclick = async () => {
            const items = Array.from(gallery.children);
            if (items.length === 0) return;
            showLoading(true, "APNG 編碼中...", "合成預覽動畫");
            try {
                const settings = getCurrentSettings();
                const bufs = [], delays = [];
                const delay = parseInt(document.getElementById('apngDelay').value) || 100;
                const loop = parseInt(document.getElementById('apngLoop').value) || 0;
                let finalW = 0, finalH = 0;
                for (let i = 0; i < items.length; i++) {
                    const fileObj = filesData.find(f => f.id === items[i].dataset.id);
                    const blob = await processImage(fileObj, settings);
                    const frameImg = await blobToImage(blob);
                    if (i === 0) { finalW = frameImg.width; finalH = frameImg.height; }
                    const canvas = document.createElement('canvas');
                    canvas.width = finalW; canvas.height = finalH;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(frameImg, 0, 0);
                    bufs.push(ctx.getImageData(0, 0, finalW, finalH).data.buffer);
                    delays.push(delay);
                }
                currentApngBlob = new Blob([UPNG.encode(bufs, finalW, finalH, 0, delays, loop)], { type: "image/png" });
                apngResultImg.src = URL.createObjectURL(currentApngBlob);
                previewModal.classList.remove('hidden');
            } catch (err) { alert("失敗"); }
            finally { showLoading(false); }
        }

        document.getElementById('clearSplitImgBtn').onclick = () => {
            if (filesData.length > 0) clearConfirmModal.classList.remove('hidden');
            else resetSplitter(false);
        };
        document.getElementById('btnKeepGallery').onclick = () => { resetSplitter(false); clearConfirmModal.classList.add('hidden'); };
        document.getElementById('btnClearAll').onclick = () => { resetSplitter(true); clearConfirmModal.classList.add('hidden'); };

        function resetSplitter(clearGallery) {
            currentSplitImage = currentSplitFile = null;
            splitPreviewImg.src = ''; splitPreviewContainer.classList.add('hidden');
            splitUploadZone.classList.remove('hidden');
            document.getElementById('splitAndImportBtn').disabled = document.getElementById('directImportBtn').disabled = true;
            if (clearGallery) { filesData = []; gallery.innerHTML = ''; }
        }

        function blobToImage(blob) { return new Promise(r => { const url = URL.createObjectURL(blob); const img = new Image(); img.onload = () => { URL.revokeObjectURL(url); r(img); }; img.src = url; }); }
        function showLoading(show, title, text) { loadingOverlay.classList.toggle('hidden', !show); document.getElementById('loadingTitle').innerText = title || ""; document.getElementById('loadingText').innerText = text || ""; }
        document.getElementById('closePreviewBtn').onclick = document.getElementById('rebuildApngBtn').onclick = () => previewModal.classList.add('hidden');
        document.getElementById('downloadApngBtn').onclick = () => currentApngBlob && saveAs(currentApngBlob, `apng_${Date.now()}.png`);
        document.getElementById('sortOriginalBtn').onclick = () => { const its = Array.from(gallery.children); its.sort((a,b) => a.dataset.origName.localeCompare(b.dataset.origName, undefined, {numeric:true})); its.forEach(it => gallery.appendChild(it)); updateAllFilenames(); };
    </script>
</body>
</html>
